pre-commit:
  parallel: true
  commands:
    # 与 CI lint job 同一套工具与规则：oxlint --deny-warnings / oxfmt（.oxfmtrc.json）
    # pre-commit 对暂存文件 --fix/--write；CI 再全量检查一次
    lint:
      glob: '*.{ts,js,tsx,jsx,mts,cts,mjs,cjs}'
      exclude: 'dist|node_modules|coverage'
      run: pnpm oxlint --fix --deny-warnings {staged_files}
      stage_fixed: true
    format:
      glob: '*.{ts,js,tsx,jsx,mts,cts,mjs,cjs,json,md,css,yml,yaml}'
      exclude: 'dist|node_modules|coverage|pnpm-lock.yaml|CHANGELOG.md'
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
